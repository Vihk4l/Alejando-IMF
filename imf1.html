<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Additional Verification Required</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background-color: #0a1628;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background-color: #0d1f3c;
      border-radius: 16px;
      max-width: 420px;
      width: 100%;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
    }

    .header {
      background-color: #c0392b;
      padding: 20px 24px;
      text-align: center;
    }

    .header h1 {
      color: #ffffff;
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .header p {
      color: rgba(255, 255, 255, 0.85);
      font-size: 0.9rem;
      margin-top: 4px;
    }

    .body {
      padding: 36px 28px 28px;
      text-align: center;
    }

    .icon-wrap {
      width: 72px;
      height: 72px;
      background-color: rgba(192, 57, 43, 0.15);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
    }

    .icon-wrap svg {
      width: 36px;
      height: 36px;
      fill: none;
      stroke: #e74c3c;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .message {
      color: #c8d6e5;
      font-size: 0.95rem;
      line-height: 1.65;
      margin-bottom: 28px;
    }

    .field-label {
      text-align: left;
      color: #8fafc7;
      font-size: 0.82rem;
      font-weight: 600;
      letter-spacing: 0.4px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .input-field {
      width: 100%;
      background-color: #112240;
      border: 1.5px solid #1e3a5f;
      border-radius: 10px;
      padding: 14px 16px;
      color: #e0eaf5;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 20px;
    }

    .input-field::placeholder {
      color: #4a6580;
    }

    .input-field:focus {
      border-color: #2980b9;
    }

    .btn-confirm {
      width: 100%;
      background-color: #112240;
      border: none;
      border-radius: 10px;
      padding: 16px;
      color: #e0eaf5;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: background-color 0.2s;
    }

    .btn-confirm:hover {
      background-color: #1a3558;
    }

    .btn-confirm svg {
      width: 20px;
      height: 20px;
      stroke: #e0eaf5;
      fill: none;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
  </style>
</head>

<body>
  <div class="card">
    <div class="header">
      <h1>Alejandro Before You Proceed!</h1>
      <p>Additional verification is required</p>
    </div>

    <div class="body">
      <div class="icon-wrap">
        <svg viewBox="0 0 24 24">
          <path d="M12 2L4 6v6c0 5.25 3.5 10.15 8 11.35C16.5 22.15 20 17.25 20 12V6L12 2z" />
          <line x1="12" y1="9" x2="12" y2="13" />
          <circle cx="12" cy="16" r="0.5" fill="#e74c3c" stroke="#e74c3c" />
        </svg>
      </div>

      <p class="message">
        The IMF code is required to enable you to continue with this transaction.
        Please contact our online customer care representative with the live chat:
        they will help you with the appropriate IMF code for this transaction.
      </p>
      <button class="btn-confirm">
        <svg viewBox="0 0 24 24">
          <polyline points="20 6 9 17 4 12" />
        </svg>
        Acquire IMF CODE
      </button>
      <div class="field-label">IMF Code</div>
      <input class="input-field" type="text" placeholder="Enter IMF code" />


    </div>
  </div>
</body>

</html>
